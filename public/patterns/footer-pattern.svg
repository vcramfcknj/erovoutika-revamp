<svg width="1920" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="footerGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.05"/>
    </pattern>
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1920" height="600" fill="url(#footerGrad)"/>
  <rect width="1920" height="600" fill="url(#footerGrid)"/>
  
  <!-- Circuit-like lines -->
  <path d="M 0 100 L 300 100 L 300 200 L 500 200" stroke="#3B82F6" stroke-width="1" opacity="0.1" fill="none"/>
  <path d="M 1920 300 L 1600 300 L 1600 400 L 1400 400" stroke="#8B5CF6" stroke-width="1" opacity="0.1" fill="none"/>
  <circle cx="300" cy="100" r="3" fill="#3B82F6" opacity="0.2"/>
  <circle cx="300" cy="200" r="3" fill="#3B82F6" opacity="0.2"/>
  <circle cx="1600" cy="300" r="3" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="1600" cy="400" r="3" fill="#8B5CF6" opacity="0.2"/>
</svg>