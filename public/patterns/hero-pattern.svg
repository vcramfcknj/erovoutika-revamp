<svg width="1920" height="1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="1.5" fill="#3B82F6" opacity="0.1"/>
      <circle cx="0" cy="0" r="1.5" fill="#3B82F6" opacity="0.1"/>
      <circle cx="100" cy="0" r="1.5" fill="#3B82F6" opacity="0.1"/>
      <circle cx="0" cy="100" r="1.5" fill="#3B82F6" opacity="0.1"/>
      <circle cx="100" cy="100" r="1.5" fill="#3B82F6" opacity="0.1"/>
    </pattern>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#grad)"/>
  
  <!-- Geometric shapes -->
  <circle cx="200" cy="200" r="150" fill="#3B82F6" opacity="0.03"/>
  <circle cx="1720" cy="880" r="200" fill="#8B5CF6" opacity="0.03"/>
  <rect x="1500" y="100" width="250" height="250" rx="20" fill="#3B82F6" opacity="0.02" transform="rotate(15 1625 225)"/>
  <polygon points="300,800 400,950 200,950" fill="#8B5CF6" opacity="0.02"/>
</svg>